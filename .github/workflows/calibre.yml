name: 'Calibre'

on:
  workflow_dispatch:
    inputs:
      fileid:
        description: 'File ID'
        type: number
        required: true
      filetype:
        description: 'Filetype'
        type: string
        required: true

jobs:
  calibre:
    runs-on: ubuntu-latest
    steps:
    - name: Download
      shell: bash
      run: |
        libranaut_full_id=$(printf '%07d' '${{ inputs.fileid }}')
        libranaut_dir_id=${libranaut_full_id::-3}
        libranaut_file_id=${libranaut_full_id: -3}
        libranaut_in_file=orig.${{ inputs.filetype }}
        curl -sSo $libranaut_in_file "${{ secrets.WORKFLOW_DOWNLOAD }}$libranaut_dir_id/$libranaut_file_id/$libranaut_in_file"
        echo "libranaut_in_file=$libranaut_in_file" >> $GITHUB_ENV
    - uses: EIGHTFINITE/ebook-convert-action@main
      with:
        in: ${{ env.libranaut_in_file }}
        out: orig.zip
        args:
    - name: Upload
      shell: bash
      run: |
        curl -sS -X POST -H "Content-Type: multipart/form-data" -F "data=@orig.zip" "${{ secrets.WORKFLOW_UPLOAD }}${{ inputs.fileid }}"
